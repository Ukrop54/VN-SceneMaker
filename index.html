<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <title>Scene Editor</title>
      <link rel="stylesheet" href="style.css" />
      <link
         href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
         rel="stylesheet"
         integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
         crossorigin="anonymous"
      />
   </head>
   <body>
      <div class="container">
         <div id="app">
            <div id="scene-container">
               <div id="scene" style="width: 100%">
                  <img id="bg" />
                  <img id="char-body" />
                  <img id="char-clothes" />
                  <img id="char-emotion" />
               </div>
            </div>
         </div>
         <div class="bg-interactions row row-cols-3">
            <div class="col">
               <div class="bgchoosecontainer">
                  <button type="button" data-bs-toggle="modal" data-bs-target="#bgchoosemodal" class="btn btn-primary" style="width: 100%">
                     Choose Background
                  </button>
               </div>
            </div>

            <div class="col">
               <div class="bgweather">
                  <select class="form-select" onchange="setWeather(this.value)">
                     <option value="#" selected disabled>Weather:</option>
                     <option value="none">None</option>
                     <optgroup label="Rain effects">
                        <option value="lrain">Light</option>
                        <option value="mrain">Moderate</option>
                        <option value="hrain">Heavy</option>
                     </optgroup>
                     <optgroup label="Snow effects">
                        <option value="lsnow">Light</option>
                        <option value="msnow">Moderate</option>
                        <option value="hsnow">Heavy</option>
                     </optgroup>
                     <!-- <option value="dadw">
                        <select name="#" id="dawdwd">
                           <option value="da"></option>
                           <option value="snow">Snow</option>
                        </select>
                     </option> -->
                  </select>
               </div>
            </div>
            <div class="col">
               <div class="bgcorrections">
                  <div class="row row-cols-2">
                     <div class="col">
                        <select class="form-select" onchange="setCorrection(this.value)">
                           <option value="#" selected disabled>Color Correction:</option>
                           <option value="none">None</option>
                           <option value="sepia">Sepia</option>
                           <option value="oldphoto">Old Photo</option>
                           <option value="rain">Rain</option>
                           <option value="grayed">Grayed</option>
                           <option value="negative">Negative</option>
                           <!-- <option value="brightness">Brightness</option>
                     <option value="contrast">Contrast</option>
                     <option value="saturation">Saturation</option> -->
                        </select>
                     </div>
                     <div class="col">
                        <div class="bgeffects">
                           Blur:
                           <input type="range" class="form-range" min="0" max="15" value="0" oninput="setBlur(this.value)" />
                        </div>
                     </div>
                  </div>
               </div>
            </div>
         </div>

         <!-- <div id="controls"> -->

                  <button onclick="exportImage()">📸 Export</button>

         <div class="character-interactions">
            <div class="row row-cols-3">
               <div class="col">
                  <div id="scene-container" data-bs-toggle="modal" data-bs-target="#chchoosemodal">
                     <div class="PreviewScene" id="scene" style="width: 100%">
                        <img id="bg" />
                        <p class="text-center" style="position: relative; top: 50%">Click Me</p>
                     </div>
                  </div>
               </div>
               <div class="col"></div>
            </div>
         </div>
         <div class="modal fade" id="chchoosemodal" tabindex="-1" aria-labelledby="ChModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
               <div class="modal-content">
                  <div class="modal-header">
                     <h1 class="modal-title fs-5" id="ChModalLabel">
                        Choose <a style="text-decoration: none; position: relative" href="#">or load</a> Character
                     </h1>
                     <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                  </div>
                  <div class="modal-body p-4 py-5 p-md-5"></div>
               </div>
            </div>
         </div>
         <div class="modal fade" id="bgchoosemodal" tabindex="-1" aria-labelledby="ChModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
               <div class="modal-content">
                  <div class="modal-header">
                     <h1 class="modal-title fs-5" id="BgModalLabel">
                        Choose <a style="text-decoration: none; position: relative" href="#">or load</a> Background
                     </h1>
                     <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                  </div>
                  <div class="modal-body p-4 py-5 p-md-5">
                     <!-- <div class="text-center"></div>
                     <div class="bg-gallery">
                        <div class="row row-cols-3">
                           <div class="col"></div>
                        </div>
                     </div> -->
                  </div>
               </div>
            </div>
         </div>
         <br />
         <br />
      </div>

         crossorigin="anonymous"
      ></script>
      <script src="https://code.jquery.com/jquery-3.7.1.js"></script>

      <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
      <script src="script.js"></script>
