<!doctype html>
<html lang="en" data-bs-theme="dark">
   <head>
      <meta charset="UTF-8" />
      <title>Scene Maker</title>
      <link rel="stylesheet" href="style.css" />
      <link
         href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
         rel="stylesheet"
         integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
         crossorigin="anonymous"
      />
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
   </head>
   <body>
      <div class="container">
         <div class="mainbox">
            <div class="bgzone">
               <div id="app">
                  <div id="main-scene-container" style="border: 1px solid #cccccc71">
                     <div id="scene" style="width: 100%">
                        <img id="bg" />
                        <img id="char-body" />
                        <img id="char-clothes" />
                        <img id="char-emotion" />
                        <img id="char-accessory" />
                     </div>
                  </div>
               </div>
               <div class="bg-interactions row row-cols-6">
                  <div class="col">
                     <div>
                        <button
                           type="button"
                           data-bs-toggle="modal"
                           data-bs-target="#bgchoosemodal"
                           class="btn btn-outline-primary"
                           style="width: 100%; margin: 5% auto"
                        >
                           Choose Background
                        </button>
                     </div>
                  </div>
                  <div class="col">
                     <button type="button" class="btn btn-outline-primary" style="width: 100%; margin: 5% auto" onclick="workinprogress()">
                        Add Character
                     </button>
                  </div>
                  <div class="col">
                     <div class="bgweather">
                        <select class="form-select" onchange="setWeather(this.value)">
                           <option value="#" selected disabled>Weather:</option>
                           <option value="none">None</option>
                           <optgroup label="Rain effects">
                              <option value="lrain">Light</option>
                              <option value="mrain">Moderate</option>
                              <option value="hrain">Heavy</option>
                           </optgroup>
                           <optgroup label="Snow effects">
                              <option value="lsnow">Light</option>
                              <option value="msnow">Moderate</option>
                              <option value="hsnow">Heavy</option>
                           </optgroup>
                        </select>
                     </div>
                  </div>
                  <div class="col">
                     <div class="bgcorrections">
                        <select class="form-select" onchange="setCorrection(this.value)">
                           <option value="#" selected disabled>Color Correction:</option>
                           <option value="none">None</option>
                           <option value="sepia">Sepia</option>
                           <option value="oldphoto">Old Photo</option>
                           <option value="rain">Rain</option>
                           <option value="grayed">Grayed</option>
                           <option value="negative">Negative</option>
                           <!-- <option value="brightness">Brightness</option>
                        <option value="contrast">Contrast</option>
                        <option value="saturation">Saturation</option> -->
                        </select>
                     </div>
                  </div>
                  <div class="col">
                     <div class="bgeffects">
                        Blur:
                        <input type="range" class="form-range" min="0" max="15" value="0" oninput="setBlur(this.value)" />
                     </div>
                  </div>
                  <div class="col">
                     <div class="export">
                        <button class="btn exportbtn" onclick="exportImage()">📸 Export <span></span></button>
                     </div>
                  </div>
               </div>
            </div>

            <div class="character-interactions chzone">
               <div class="row">
                  <div class="col">
                     <div id="preview-scene-container" data-bs-toggle="modal" data-bs-target="#chchoosemodal" style="border: 1px solid #cccccc71">
                        <div class="PreviewScene" id="scene" style="width: 100%; aspect-ratio: 0.83 / 1">
                           <p class="text-center" style="position: relative; top: 50%">Click Me</p>
                           <img id="pchar-body" />
                           <img id="pchar-clothes" />
                           <img id="pchar-emotion" />
                           <img id="pchar-accessory" />
                        </div>
                     </div>
                  </div>
                  <div class="col-sm-8">
                     <div class="ch-position">
                        <input
                           id="chpositionrange"
                           type="range"
                           class="form-range"
                           min="-70"
                           max="70"
                           value="0"
                           id="char-y"
                           oninput="setCharPos(this.value)"
                        />
                     </div>
                     <div class="row row-cols-2">
                        <!-- <div class="col sprstylemaindiv1" id="sprstylemaindiv" style="border: 1px solid #a4a4a460; border-radius: 5px"> -->
                        <!-- <p style="margin: auto; position: relative; top: 10%; font-size: medium">Style:</p> -->
                        <!-- <i
                                    class="bi bi-chevron-down"
                                    style="position: relative; left: 95%; bottom: 50%; cursor: pointer"
                                    id="show-sprstyle"
                                 ></i> -->
                        <div class="col">
                           <div class="sprite-editor" id="body-editor-div">
                              <div class="sprite-editor-header" onclick="toggleEditorMenu('body')">
                                 <span>Body</span>
                                 <i class="bi bi-chevron-down" id="body_arrow"></i>
                              </div>
                              <div class="sprite-editor-content" id="body-editor_content" style="display: none">
                                 <div class="left-category">
                                    <div id="left-body"></div>
                                 </div>
                              </div>
                           </div>
                           <div class="sprite-editor" id="clothes-editor-div" style="margin-bottom: 5%">
                              <div class="sprite-editor-header" onclick="toggleEditorMenu('clothes')">
                                 <span>Clothes</span>
                                 <i class="bi bi-chevron-down" id="clothes_arrow"></i>
                              </div>
                              <div class="sprite-editor-content" id="clothes-editor_content" style="display: none">
                                 <div class="left-category">
                                    <div id="left-clothes"></div>
                                 </div>
                              </div>
                           </div>
                           <div class="sprstyle-select-box">
                              <div class="sprstyle-select-header" id="sprstyle-select-header">
                                 <span>Sprite Style</span>
                                 <i class="bi bi-chevron-down" id="show-sprstyle"></i>
                              </div>
                              <div class="sprstyle-content" id="sprstyle-content" style="display: none">
                                 <div class="row">
                                    <div class="col">
                                       <div class="sprite-time" id="sprite-time">
                                          <div class="form-check">
                                             <input class="form-check-input" type="radio" name="spritetime" value="sunset" id="sunset" />
                                             <label class="form-check-label" for="sunset">Sunset</label>
                                          </div>

                                          <div class="form-check">
                                             <input class="form-check-input" type="radio" name="spritetime" value="day" id="day" checked />
                                             <label class="form-check-label" for="day">Day</label>
                                          </div>
                                          <div class="form-check">
                                             <input class="form-check-input" type="radio" name="spritetime" value="night" id="night" />
                                             <label class="form-check-label" for="night">Night</label>
                                          </div>
                                          <div class="form-check">
                                             <input class="form-check-input" type="radio" name="spritetime" value="epilogue" id="epilogue" />
                                             <label class="form-check-label" for="epilogue">Epilogue</label>
                                          </div>
                                          <div class="form-check">
                                             <input class="form-check-input" type="radio" name="spritetime" value="desat" id="desat" />
                                             <label class="form-check-label" for="desat">Desaturated</label>
                                          </div>
                                          <div class="form-check">
                                             <input class="form-check-input" type="radio" name="spritetime" value="rain" id="rain" />
                                             <label class="form-check-label" for="rain">Rain</label>
                                          </div>
                                          <div class="form-check">
                                             <input class="form-check-input" type="radio" name="spritetime" value="sepia" id="sepia" />
                                             <label class="form-check-label" for="sepia">Sepia</label>
                                          </div>
                                          <div class="form-check">
                                             <input class="form-check-input" type="radio" name="spritetime" value="noir" id="noir" />
                                             <label class="form-check-label" for="noir">Noir</label>
                                          </div>

                                          <div class="form-check">
                                             <input class="form-check-input" type="radio" name="spritetime" value="shade" id="shade" />
                                             <label class="form-check-label" for="shade">Shade</label>
                                          </div>
                                          <div class="form-check">
                                             <input class="form-check-input" type="radio" name="spritetime" value="fire" id="fire" />
                                             <label class="form-check-label" for="fire">Fire</label>
                                          </div>
                                          <div class="form-check">
                                             <input class="form-check-input" type="radio" name="spritetime" value="dream" id="dream" />
                                             <label class="form-check-label" for="dream">Dream</label>
                                          </div>
                                       </div>
                                    </div>
                                    <div class="col">
                                       <div
                                          class="col d-flex align-items-center justify-content-center"
                                          style="margin: 5%; justify-content: center; height: 100%"
                                       >
                                          <img
                                             id="previewImage"
                                             src="https://picsum.photos/400/600"
                                             class="img-fluid rounded"
                                             alt="preview"
                                             style="border: 1px solid #a4a4a4"
                                          />
                                       </div>
                                    </div>
                                 </div>
                              </div>
                           </div>
                        </div>

                        <div class="col">
                           <!-- <div class="textstylediv" id="sprite-style" style="display: none"></div> -->
                           <div class="sprite-editor" id="emotion-editor-div">
                              <div class="sprite-editor-header" onclick="toggleEditorMenu('emotion')">
                                 <span>Emotion</span>
                                 <i class="bi bi-chevron-down" id="emotion_arrow"></i>
                              </div>
                              <div class="sprite-editor-content" id="emotion-editor_content" style="display: none">
                                 <div class="left-category">
                                    <div id="left-emotions"></div>
                                 </div>
                              </div>
                           </div>
                           <div class="sprite-editor" id="decoration-editor-div" style="margin-bottom: 5%">
                              <div class="sprite-editor-header" onclick="toggleEditorMenu('decoration')">
                                 <span>Decoration</span>
                                 <i class="bi bi-chevron-down" id="decoration_arrow"></i>
                              </div>
                              <div class="sprite-editor-content" id="decoration-editor_content" style="display: none">
                                 <div class="left-category">
                                    <div id="left-decor"></div>
                                 </div>
                              </div>
                           </div>
                           <div class="chpositionselect">
                              <select class="form-select" onchange="setCharPos(this.value)">
                                 <option value="left">Left</option>
                                 <option value="cl">Center-Left</option>
                                 <option value="center" selected>Center</option>
                                 <option value="cr">Center-Right</option>
                                 <option value="right">Right</option>
                              </select>
                           </div>
                        </div>
                     </div>
                  </div>
               </div>
            </div>
            <div class="modal fade" id="bgchoosemodal" tabindex="-1" aria-labelledby="ChModalLabel" aria-hidden="true">
               <div class="modal-dialog modal-dialog-centered">
                  <div class="modal-content">
                     <div class="modal-header">
                        <h1 class="modal-title fs-5" id="BgModalLabel">
                           Choose <a style="text-decoration: none; position: relative" href="#" onclick="workinprogress()">or load</a> Background
                        </h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                     </div>
                     <div class="modal-body p-4 py-5 p-md-5">
                        <div class="explorer" id="background-explorer" onmousedown="return false;" onselectstart="return false"></div>
                        <!-- <div class="text-center"></div>
                     <div class="bg-gallery">
                        <div class="row row-cols-3">
                           <div class="col"></div>
                        </div>
                     </div> -->
                     </div>
                  </div>
               </div>
            </div>

            <div class="modal fade" id="chchoosemodal" tabindex="-1" aria-labelledby="ChModalLabel" aria-hidden="true">
               <div class="modal-dialog modal-dialog-centered">
                  <div class="modal-content">
                     <div class="modal-header">
                        <h1 class="modal-title fs-5" id="ChModalLabel">
                           Choose <a style="text-decoration: none; position: relative" href="#" onclick="workinprogress()">or load</a> Character
                        </h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                     </div>
                     <div class="modal-body p-4 py-5 p-md-5">
                        <div class="explorer" id="sprite-explorer"></div>
                     </div>
                  </div>
               </div>
            </div>
            <div
               id="export-scene"
               style="position: absolute; left: -9999px; top: 0; width: 1280px; height: 720px; overflow: hidden; background: transparent"
            >
               <img id="export-bg" style="position: absolute; width: 100%; height: 100%; object-fit: cover" />
               <img id="export-body" style="position: absolute" />
               <img id="export-clothes" style="position: absolute" />
               <img id="export-emotion" style="position: absolute" />
               <img id="export-accessory" style="position: absolute" />
            </div>
         </div>
      </div>

      <script
         src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
         integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
         crossorigin="anonymous"
      ></script>
      <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
      <script src="file_system.js"></script>

      <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
      <script src="script.js"></script>
      <script src="scenescr.js"></script>
   </body>
</html>
